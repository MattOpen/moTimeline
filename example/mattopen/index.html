<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>moTimeline — Bootstrap Example</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../../src/moTimeline.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #f3f4f6; color: #1f2937; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#1e1b4b">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">moTimeline</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="../index.html">Main example</a></li>
        <li class="nav-item"><a class="nav-link" href="../livestamp/">Livestamp</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5">
  <div class="mb-4">
    <h1 class="h3 mb-1">Bootstrap 5 Integration</h1>
    <p class="text-muted mb-0">
      moTimeline is Bootstrap-compatible out of the box — wrap the <code>&lt;ul&gt;</code> inside a
      Bootstrap <code>.container</code> for page layout. No framework option needed.
    </p>
  </div>

  <ul id="timeline"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import MoTimeline from '../../src/moTimeline.js';

  const ITEMS = [
    {
      title: 'Project kickoff',
      meta: 'January 2024',
      text: 'Kicked off the new product roadmap. Team aligned on goals, milestones, and chosen tech stack.',
      banner: '../../images/banner1.svg',
      avatar: '../../images/ryan.jpg',
    },
    {
      title: 'Design system',
      meta: 'February 2024',
      text: 'Built a shared component library. Design tokens for color, spacing, and typography exported to CSS custom properties.',
    },
    {
      title: 'API development',
      meta: 'March 2024',
      text: 'Core REST endpoints shipped. Authentication, rate limiting, and OpenAPI documentation all live.',
      banner: '../../images/banner2.svg',
      avatar: '../../images/eva.jpg',
    },
    {
      title: 'Beta launch',
      meta: 'April 2024',
      text: 'Invited 200 early users. Collected structured feedback via in-app surveys and recorded user interviews.',
    },
    {
      title: 'User testing',
      meta: 'May 2024',
      text: 'Five rounds of usability testing. Identified and resolved 12 critical UX issues before general availability.',
      banner: '../../images/banner3.svg',
      avatar: '../../images/avatar.jpg',
    },
    {
      title: 'Performance pass',
      meta: 'June 2024',
      text: 'Lighthouse score up from 62 → 96. Bundle size halved through code splitting, tree shaking, and image optimisation.',
    },
    {
      title: 'v1.0 released',
      meta: 'July 2024',
      text: 'General availability. 1 200 signups in the first week. Featured on Product Hunt front page.',
      banner: '../../images/banner4.svg',
      avatar: '../../images/ryan.jpg',
    },
    {
      title: 'Roadmap planning',
      meta: 'August 2024',
      text: 'Q3 / Q4 roadmap published. Community voting open — top three requests already scoped for the next release.',
    },
  ];

  function makeItem(d) {
    const li = document.createElement('li');
    if (d.banner) {
      li.innerHTML = `
        <div class="mo-card">
          <div class="mo-card-image">
            <img class="mo-banner" src="${d.banner}" alt="">
            ${d.avatar ? `<img class="mo-avatar" src="${d.avatar}" alt="">` : ''}
          </div>
          <div class="mo-card-body">
            <h3>${d.title}</h3>
            <p class="mo-meta">${d.meta}</p>
            <p>${d.text}</p>
          </div>
        </div>`;
    } else {
      li.innerHTML = `
        <div class="mo-card">
          <div class="mo-card-body">
            <h3>${d.title}</h3>
            <p class="mo-meta">${d.meta}</p>
            <p>${d.text}</p>
          </div>
        </div>`;
    }
    return li;
  }

  const tlEl = document.getElementById('timeline');
  ITEMS.forEach(d => tlEl.appendChild(makeItem(d)));

  new MoTimeline(tlEl, {
    badgeShow: true,
    arrowShow: true,
    theme: true,
  });
</script>

</body>
</html>
